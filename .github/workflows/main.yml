name: Duplicate Frameworks to Individual Repos

on:
  workflow_dispatch:
    inputs:
      target_owner:
        description: 'Target GitHub username or organization (e.g., your-username)'
        required: true
        type: string
      visibility:
        description: 'Visibility of the new repositories'
        required: true
        type: choice
        options:
          - private
          - public

jobs:
  duplicate:
    runs-on: ubuntu-latest

    steps:
      - name: Configure git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Create and Push to Individual Repos
        env:
          GH_TOKEN: ${{ secrets.REPO_PAT }} # Required for the gh CLI
          PAT: ${{ secrets.REPO_PAT }}      # Required for pushing code
          TARGET: ${{ inputs.target_owner }}
          VISIBILITY: ${{ inputs.visibility }}
        run: |
          set -euo pipefail

          # Key-Value pairs: ["source_repo"]="desired_target_repo_name"
          declare -A REPOS=(
            ["nitrojs/nitro"]="nitro"
            ["nuxt/nuxt"]="nuxt"
            ["sveltejs/svelte"]="svelte"
            ["vercel-labs/agent-skills"]="agent-skills"
            ["vercel-labs/skills"]="skills"
            ["vercel/ai"]="ai"
            ["vercel/async-sema"]="async-sema"
            ["vercel/flags"]="flags"
            ["vercel/ms"]="ms"
            ["vercel/next.js"]="nextjs" # stripped the dot just to be safe
            ["vercel/swr"]="swr"
            ["vercel/turborepo"]="turborepo"
            ["vercel/vercel"]="vercel"
            ["vercel/workflow"]="workflow"
          )

          for source_repo in "${!REPOS[@]}"; do
            repo_name="${REPOS[$source_repo]}"
            echo "=================================================="
            echo "Processing $source_repo into $TARGET/$repo_name..."
            
            # 1. Create the new repository using GitHub CLI
            # The || true ensures the workflow doesn't fail if the repo already exists
            gh repo create "$TARGET/$repo_name" --$VISIBILITY || echo "Repo $TARGET/$repo_name might already exist."

            # 2. Clone the latest snapshot of the source repo
            git clone --depth 1 "https://x-access-token:${PAT}@github.com/$source_repo.git" "$repo_name"

            # 3. Enter directory, strip old history, and re-initialize
            cd "$repo_name"
            rm -rf .git
            git init
            git checkout -b main
            
            # 4. Commit the snapshot
            git add .
            git commit -m "Initial snapshot from $source_repo" || echo "Nothing to commit"

            # 5. Push to the newly created target repo
            git remote add origin "https://x-access-token:${PAT}@github.com/$TARGET/$repo_name.git"
            git push -u origin main --force
            
            # 6. Cleanup to keep the runner workspace clean
            cd ..
            rm -rf "$repo_name"
            
            echo "Successfully duplicated $source_repo to $TARGET/$repo_name!"
          done
